name: Daily Releases Refresh

on:
  schedule:
    # 03:00 Israel time = 00:00 UTC (IST is UTC+3)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  releases-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: mgsr-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mgsr-web/package-lock.json

      - run: npm ci

      - name: Run releases refresh
        run: npx tsx _releases_refresh.ts
        env:
          CI: true
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
