name: Test TM Scraping from GitHub Actions

on:
  workflow_dispatch:

jobs:
  test-tm-fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: mgsr-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mgsr-web/package-lock.json

      - run: npm ci

      - name: Test TM fetching
        run: npx tsx _test_tm_fetch.ts
        env:
          CI: true
