name: Scrape Transfer Windows

on:
  schedule:
    - cron: '0 8 * * *'  # 8am UTC daily
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: transfer-windows
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mgsr-backend/package-lock.json

      - name: Install dependencies
        run: cd mgsr-backend && npm ci

      - name: Install Playwright browsers
        run: cd mgsr-backend && npx playwright install chromium --with-deps

      - name: Scrape transfer windows
        run: cd mgsr-backend && node scripts/scrape-transfer-windows.js

      - name: Update file via GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'mgsr-web/public/transfer-windows.json';
            const branch = context.ref.replace('refs/heads/', '') || 'main';
            const newContent = fs.readFileSync(path, 'utf8');
            const newContentB64 = Buffer.from(newContent).toString('base64');

            async function update() {
              let sha;
              try {
                const { data } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path,
                  ref: branch
                });
                sha = data.sha;
                const currentB64 = data.content.replace(/\n/g, '');
                if (currentB64 === newContentB64) {
                  console.log('No changes to transfer-windows.json');
                  return;
                }
              } catch (e) {
                if (e.status === 404) sha = null;
                else throw e;
              }

              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path,
                message: 'chore: update transfer windows [skip ci]',
                content: newContentB64,
                sha: sha || undefined,
                branch
              });
              console.log('Updated transfer-windows.json');
            }

            try {
              await update();
            } catch (e) {
              if (e.status === 409) {
                console.log('Conflict - retrying with fresh fetch...');
                await new Promise(r => setTimeout(r, 2000));
                await update();
              } else throw e;
            }
