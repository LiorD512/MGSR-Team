name: Scrape Transfer Windows

on:
  schedule:
    - cron: '0 8 * * *'  # 8am UTC daily
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: transfer-windows
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for pull --rebase

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mgsr-backend/package-lock.json

      - name: Install dependencies
        run: cd mgsr-backend && npm ci

      - name: Install Playwright browsers
        run: cd mgsr-backend && npx playwright install chromium --with-deps

      - name: Scrape transfer windows
        run: cd mgsr-backend && node scripts/scrape-transfer-windows.js

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git
          if git diff --quiet mgsr-web/public/transfer-windows.json; then
            echo "No changes to transfer-windows.json"
          else
            cp mgsr-web/public/transfer-windows.json /tmp/transfer-windows.json
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}
            cp /tmp/transfer-windows.json mgsr-web/public/transfer-windows.json
            git add mgsr-web/public/transfer-windows.json
            git commit -m "chore: update transfer windows [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
