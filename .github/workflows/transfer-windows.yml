name: Scrape Transfer Windows

on:
  schedule:
    - cron: '0 8 * * *'  # 8am UTC daily
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: transfer-windows
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mgsr-backend/package-lock.json

      - name: Install dependencies
        run: cd mgsr-backend && npm ci

      - name: Install Playwright browsers
        run: cd mgsr-backend && npx playwright install chromium --with-deps

      - name: Scrape transfer windows
        run: cd mgsr-backend && node scripts/scrape-transfer-windows.js

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update transfer windows [skip ci]"
          file_pattern: mgsr-web/public/transfer-windows.json
