name: Scrape Transfer Windows

on:
  schedule:
    - cron: '0 8 * * *'  # 8am UTC daily
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mgsr-backend/package-lock.json

      - name: Install dependencies
        run: cd mgsr-backend && npm ci

      - name: Install Playwright browsers
        run: cd mgsr-backend && npx playwright install chromium --with-deps

      - name: Scrape transfer windows
        run: cd mgsr-backend && node scripts/scrape-transfer-windows.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mgsr-web/public/transfer-windows.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update transfer windows [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi
