name: Weekly Contract Finishers Cache

on:
  schedule:
    # 2:00 AM Israel time (23:00 UTC) every Monday
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  populate-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    defaults:
      run:
        working-directory: mgsr-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mgsr-web/package-lock.json

      - run: npm ci

      - name: Populate contract finishers cache
        run: npx tsx _populate_cache.ts finishers
        env:
          CI: true
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
