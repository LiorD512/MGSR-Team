<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MGSR WhatsApp Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 540px;
  height: 960px;
  overflow: hidden;
  font-family: 'Outfit', sans-serif;
  background: #0A1018;
  color: #E8EAED;
  position: relative;
  margin: 0 auto;
}

/* Background layers */
.bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(77,182,172,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(77,182,172,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  opacity: 0.6;
}

.bg-orb-1 {
  position: absolute;
  width: 350px; height: 350px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(77,182,172,0.18), transparent 70%);
  top: -15%; right: -20%;
  filter: blur(60px);
}

.bg-orb-2 {
  position: absolute;
  width: 250px; height: 250px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(57,209,100,0.12), transparent 70%);
  bottom: 10%; left: -15%;
  filter: blur(80px);
}

.bg-orb-3 {
  position: absolute;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,255,0.08), transparent 70%);
  top: 40%; left: 30%;
  filter: blur(90px);
}

/* Diagonal accent line */
.accent-line {
  position: absolute;
  top: 0; left: 0;
  width: 200%;
  height: 1.5px;
  background: linear-gradient(90deg, transparent 0%, rgba(77,182,172,0.5) 30%, rgba(57,209,100,0.4) 60%, transparent 100%);
  transform: rotate(25deg);
  transform-origin: top left;
  top: 260px;
  left: -100px;
}

.accent-line-2 {
  position: absolute;
  width: 200%;
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(77,182,172,0.2) 40%, transparent 100%);
  transform: rotate(25deg);
  transform-origin: top left;
  top: 280px;
  left: -100px;
}

/* Content */
.content {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  padding: 50px 40px;
  text-align: center;
}

/* Top badge */
.top-badge {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: #4DB6AC;
  margin-bottom: 30px;
  position: relative;
}
.top-badge::before,
.top-badge::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 30px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #4DB6AC);
}
.top-badge::before { right: calc(100% + 12px); }
.top-badge::after { left: calc(100% + 12px); background: linear-gradient(90deg, #4DB6AC, transparent); }

/* Logo */
.logo-wrap {
  margin-bottom: 35px;
}
.logo-wrap svg {
  width: 160px;
  height: 160px;
  filter: drop-shadow(0 0 40px rgba(77,182,172,0.2)) drop-shadow(0 0 80px rgba(57,209,100,0.1));
}

/* Main headline */
.headline {
  font-family: 'Syne', sans-serif;
  font-size: 44px;
  font-weight: 800;
  line-height: 1.05;
  letter-spacing: -0.03em;
  margin-bottom: 16px;
}
.headline .glow {
  background: linear-gradient(135deg, #4DB6AC, #39D164, #00D4FF);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Subtitle */
.subtitle {
  font-size: 18px;
  font-weight: 300;
  color: #B0B8C1;
  max-width: 350px;
  line-height: 1.5;
  margin-bottom: 40px;
}

/* URL card */
.url-card {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(26,39,54,0.8);
  border: 1.5px solid rgba(77,182,172,0.3);
  border-radius: 100px;
  padding: 14px 28px;
  margin-bottom: 28px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.3), 0 0 30px rgba(77,182,172,0.08);
}
.url-card .globe-icon {
  width: 18px;
  height: 18px;
  stroke: #4DB6AC;
  stroke-width: 1.8;
  fill: none;
}
.url-card .url-text {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.01em;
  background: linear-gradient(135deg, #4DB6AC, #39D164);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Arrow / CTA */
.cta-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.cta-text {
  font-size: 14px;
  font-weight: 400;
  color: #6B7B8D;
  letter-spacing: 0.08em;
}
.cta-arrow {
  width: 24px;
  height: 24px;
  stroke: #4DB6AC;
  stroke-width: 2;
  fill: none;
  opacity: 0.6;
}

/* Bottom services strip */
.services-strip {
  position: absolute;
  bottom: 50px;
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
  padding: 0 30px;
}
.service-tag {
  padding: 6px 14px;
  background: rgba(77,182,172,0.06);
  border: 1px solid rgba(77,182,172,0.12);
  border-radius: 100px;
  font-size: 11px;
  font-weight: 500;
  color: rgba(176,184,193,0.7);
  white-space: nowrap;
}

/* Decorative corner marks */
.corner-mark {
  position: absolute;
  width: 20px;
  height: 20px;
  border-color: rgba(77,182,172,0.15);
  border-style: solid;
}
.corner-mark.tl { top: 25px; left: 25px; border-width: 2px 0 0 2px; }
.corner-mark.tr { top: 25px; right: 25px; border-width: 2px 2px 0 0; }
.corner-mark.bl { bottom: 25px; left: 25px; border-width: 0 0 2px 2px; }
.corner-mark.br { bottom: 25px; right: 25px; border-width: 0 2px 2px 0; }
</style>
</head>
